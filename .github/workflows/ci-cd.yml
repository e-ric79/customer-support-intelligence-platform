name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. Test Job: Runs tests to ensure code quality
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Match your project's version

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: install train dependecies (if separate)
        run: |
          pip install -r ../training/requirements.txt

      - name: Train model
        run: |
          python ../training/prepare_data.py
          python ../training/train.py
      
      - name: Evaluate model & fail if poor performance
        run: |
          python ../training/evaluate.py

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          # Run pytest with coverage (optional but recommended)
          pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: failure() # Only upload if you want to track it, or remove if condition
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # 2. Build & Push Job: Only runs if tests pass AND on 'main' branch
  build-and-push:
    needs: test # Depends on the test job finishing successfully
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only run on main branch push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          platforms: linux/amd64 # Ensure compatibility with Minikube/Cloud

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          platforms: linux/amd64